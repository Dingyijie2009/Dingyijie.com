<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丁奕杰制作的匹对 + 查重系统</title>

<style>
body{
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
    padding:20px;
    color:#333;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

.container{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.card{
    flex:1;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

textarea{
    width:100%;
    height:250px;
    padding:10px;
    font-size:14px;
    border-radius:10px;
    border:1px solid #ddd;
    resize:none;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
}

.primary{
    background:#4facfe;
    color:white;
}

.success{
    background:#00c851;
    color:white;
}

.warning{
    background:#ffbb33;
    color:white;
}

.stats{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    margin-bottom:20px;
}
</style>
</head>

<body>

<h1>📦 快递单号匹对 + 查重系统</h1>

<div class="container">
    <div class="card">
        <h3>所有单号清单（基准库）</h3>
        <textarea id="allList" placeholder="支持Excel直接粘贴"></textarea>
    </div>

    <div class="card">
        <h3>匹对清单（需要核对的）</h3>
        <textarea id="matchList" placeholder="支持Excel直接粘贴"></textarea>
    </div>
</div>

<div style="text-align:center;">
    <button class="primary" onclick="checkTracking()">开始匹对</button>
    <button class="warning" onclick="checkDuplicate()">检查匹对清单重复</button>
</div>

<div class="stats">
    <p>匹对清单总数量：<span id="totalCount">0</span></p>
    <p>已匹对数量：<span id="matchedCount">0</span></p>
    <p>未匹对数量：<span id="remainingCount">0</span></p>
    <p>重复数量：<span id="duplicateCount">0</span></p>
</div>

<div class="card">
    <h3>输出结果</h3>
    <textarea id="result"></textarea>
    <div style="margin-top:10px;">
        <button class="success" onclick="copyResult()">一键复制</button>
        <button class="warning" onclick="downloadTxt()">导出TXT</button>
    </div>
</div>

<script>

// 标准化输入（支持空格/换行/Excel）
function splitInput(text){
    return text
        .split(/\s+/)
        .map(item => item.trim())
        .filter(item => item !== "")
        .map(item => item.toUpperCase());
}

// ================== 匹对功能 ==================
function checkTracking(){

    const allArray = [...new Set(splitInput(
        document.getElementById("allList").value
    ))];

    const matchArray = splitInput(
        document.getElementById("matchList").value
    );

    const allSet = new Set(allArray);

    const notMatched = [];
    const matched = [];

    matchArray.forEach(item=>{
        if(allSet.has(item)){
            matched.push(item);
        }else{
            notMatched.push(item);
        }
    });

    document.getElementById("result").value =
        notMatched.join("\n");

    document.getElementById("totalCount").innerText =
        matchArray.length;

    document.getElementById("matchedCount").innerText =
        matched.length;

    document.getElementById("remainingCount").innerText =
        notMatched.length;

    document.getElementById("duplicateCount").innerText = 0;
}

// ================== 查重功能 ==================
function checkDuplicate(){

    const matchArray = splitInput(
        document.getElementById("matchList").value
    );

    const countMap = {};
    const duplicates = [];

    matchArray.forEach(item=>{
        countMap[item] = (countMap[item] || 0) + 1;
    });

    for(const key in countMap){
        if(countMap[key] > 1){
            duplicates.push(key + "  (重复 " + countMap[key] + " 次)");
        }
    }

    document.getElementById("result").value =
        duplicates.join("\n");

    document.getElementById("duplicateCount").innerText =
        duplicates.length;

    document.getElementById("totalCount").innerText =
        matchArray.length;

    document.getElementById("matchedCount").innerText = 0;
    document.getElementById("remainingCount").innerText = 0;
}

// ================== 复制 ==================
function copyResult(){
    const result = document.getElementById("result");
    result.select();
    document.execCommand("copy");
    alert("已复制到剪贴板！");
}

// ================== 导出 ==================
function downloadTxt(){
    const content = document.getElementById("result").value;
    const blob = new Blob([content], {type: "text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "结果.txt";
    link.click();
}

</script>

</body>
</html>
